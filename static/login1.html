<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillCoach · Log in</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" type="image/png" href="/static/favicon.png">
</head>
<body>
<div class="login-page">
  <div class="card login-card">
    <div class="app-title">SkillCoach</div>
    <div class="org">Phenom Business Coaching Systems</div>
    <div class="notice" id="notice"></div>

    <div id="loginForm">
      <label>Email</label>
      <input id="email" type="email" autocomplete="username">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password">
      <button class="btn" style="width:100%; margin-top:18px;" id="loginBtn">Log in</button>
    </div>

    <div id="changeForm" style="display:none;">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:6px;">
        First login — please set a new password.</p>
      <label>New password (min 8 characters)</label>
      <input id="newPass" type="password" autocomplete="new-password">
      <label>Confirm new password</label>
      <input id="newPass2" type="password" autocomplete="new-password">
      <button class="btn" style="width:100%; margin-top:18px;" id="changeBtn">Set password &amp; continue</button>
    </div>
  </div>
</div>

<footer>
  Developed by
  <a href="https://www.aitamate.com" target="_blank" rel="noopener">
    <img src="https://aitamate.com/src/Logo-transparent_bg.png" alt="aitamate Solutions">
  </a>
</footer>

<script src="/static/js/api.js"></script>
<script>
let tempOldPassword = "";

function goToDashboard(role) {
  const page = { head_coach: "headcoach", coach: "coach", client: "client" }[role] || "client";
  window.location.href = `/static/${page}.html`;
}

el("loginBtn").onclick = async () => {
  const email = el("email").value.trim(), password = el("password").value;
  if (!email || !password) { flash("notice", "Enter email and password"); return; }
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ username: email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Login failed");
    localStorage.setItem("token", data.access_token);
    localStorage.setItem("role", data.role);
    localStorage.setItem("name", data.name);
    localStorage.setItem("timezone", data.timezone || "Asia/Kolkata");
    if (data.must_change_password) {
      tempOldPassword = password;
      el("loginForm").style.display = "none";
      el("changeForm").style.display = "block";
    } else {
      goToDashboard(data.role);
    }
  } catch (e) { flash("notice", e.message); }
};

el("changeBtn").onclick = async () => {
  const p1 = el("newPass").value, p2 = el("newPass2").value;
  if (p1.length < 8) { flash("notice", "Password must be at least 8 characters"); return; }
  if (p1 !== p2) { flash("notice", "Passwords do not match"); return; }
  try {
    await API.post("/api/auth/change-password", { old_password: tempOldPassword, new_password: p1 });
    goToDashboard(localStorage.getItem("role"));
  } catch (e) { flash("notice", e.message); }
};

document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (el("changeForm").style.display !== "none") el("changeBtn").click();
    else el("loginBtn").click();
  }
});
</script>
</body>
</html>
